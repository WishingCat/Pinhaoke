# Production site template. Validate and install manually; deploy/update.sh does not copy it.
server {
    listen 80;
    listen [::]:80;
    server_name 8.140.215.49 pinhaoke.love www.pinhaoke.love;

    return 301 https://www.pinhaoke.love$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pinhaoke.love www.pinhaoke.love;

    ssl_certificate /etc/letsencrypt/live/pinhaoke.love/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pinhaoke.love/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types application/json application/javascript application/xml image/svg+xml text/css text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /Images/ {
        alias /opt/pinhaoke/Images/;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering on;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
